name: "Setup Tombi"
description: "Set up your GitHub Actions workflow with Tombi"
author: "tombi-toml"
inputs:
  version:
    description: 'Version of Tombi to install (e.g., "0.7.11", "latest"). Mutually exclusive with lockfile.'
    required: false
  lockfile:
    description: "Path to a lock file used to resolve the Tombi version (uv.lock, poetry.lock, pnpm-lock.yaml, package-lock.json, yarn.lock, bun.lock). Mutually exclusive with version."
    required: false
  checksum:
    description: "SHA256 checksum to validate the downloaded executable"
    required: false
  enable-cache:
    description: 'Enable persistence of the Tombi cache. Supports "true", "false", and "auto".'
    required: false
    default: "auto"
outputs:
  cache-hit:
    description: "A boolean value to indicate whether a Tombi cache entry was restored"

runs:
  using: "node24"
  main: "dist/index.js"
  post: "dist/post/index.js"
  post-if: success()

branding:
  icon: "feather"
  color: "blue"
